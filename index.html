<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quote App</title>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gradient-to-r from-blue-200 via-purple-200 to-pink-200 min-h-screen flex items-center justify-center">
<div class="p-[3px] rounded-3xl bg-[conic-gradient(at_top,_var(--tw-gradient-stops))] from-pink-500 via-purple-500 to-blue-500 animate-spin-slow">

<div class="bg-white p-10 rounded-3xl shadow-2xl w-[500px] text-center">

<h1 class="text-4xl font-bold text-green-600 italic mb-8">
Quote App
</h1>

<div class="flex justify-center gap-3">

<input 
class="w-64 rounded-xl text-lg p-3 bg-gray-100 text-green-600 outline-none focus:ring-2 focus:ring-purple-400 transition duration-300"
type="text"
placeholder="Enter your quote"
id="quoteinput">

<button 
class="rounded-xl text-lg px-5 py-3 bg-gradient-to-r from-pink-400 to-purple-500 text-white font-semibold shadow-lg hover:scale-110 hover:shadow-xl transition duration-300"
id="quotebtn">
Add
</button>

</div>

<ul id="quotelist" class="mt-8 space-y-3 text-left text-lg"></ul>

</div>
</div>

<script src="script.js" type="module"></script>
</body>
</html>
